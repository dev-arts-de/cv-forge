version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: cvforge_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: cvforge
      POSTGRES_PASSWORD: cvforge_dev
      POSTGRES_DB: cvforge
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cvforge"]
      interval: 10s
      timeout: 5s
      retries: 5

  cvforge:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cvforge_app
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - NODE_ENV=production
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - DATABASE_URL=postgresql://cvforge:cvforge_dev@postgres:5432/cvforge
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - NEXTAUTH_URL=${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/de"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  postgres_data:
